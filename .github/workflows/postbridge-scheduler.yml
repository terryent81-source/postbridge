name: PostBridge Scheduler

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "0,30 * * * *"

permissions:
  contents: read

concurrency:
  group: postbridge-scheduler
  cancel-in-progress: false

jobs:
  scheduled-publish:
    name: Run scheduled publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
    env:
      POSTBRIDGE_BASE_URL: ${{ secrets.POSTBRIDGE_BASE_URL }}
      SCHEDULED_PUBLISH_SECRET: ${{ secrets.SCHEDULED_PUBLISH_SECRET }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${POSTBRIDGE_BASE_URL}" ]; then
            echo "Missing GitHub Secret: POSTBRIDGE_BASE_URL" >&2
            missing=1
          fi

          if [ -z "${SCHEDULED_PUBLISH_SECRET}" ]; then
            echo "Missing GitHub Secret: SCHEDULED_PUBLISH_SECRET" >&2
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Run scheduled publish
        shell: bash
        run: |
          set -euo pipefail

          base_url="${POSTBRIDGE_BASE_URL%/}"
          echo "Calling scheduled publish worker..."

          curl -fsS \
            -X POST \
            -H "x-scheduled-publish-secret: ${SCHEDULED_PUBLISH_SECRET}" \
            "${base_url}/api/scheduled/publish" \
            | tee scheduled-publish-response.json

  media-cleanup:
    name: Run media cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0,30 * * * *'
    env:
      POSTBRIDGE_BASE_URL: ${{ secrets.POSTBRIDGE_BASE_URL }}
      CLEANUP_SECRET: ${{ secrets.CLEANUP_SECRET }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${POSTBRIDGE_BASE_URL}" ]; then
            echo "Missing GitHub Secret: POSTBRIDGE_BASE_URL" >&2
            missing=1
          fi

          if [ -z "${CLEANUP_SECRET}" ]; then
            echo "Missing GitHub Secret: CLEANUP_SECRET" >&2
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Run media cleanup
        shell: bash
        run: |
          set -euo pipefail

          base_url="${POSTBRIDGE_BASE_URL%/}"
          echo "Calling media cleanup worker..."

          curl -fsS \
            -X POST \
            -H "x-cleanup-secret: ${CLEANUP_SECRET}" \
            "${base_url}/api/cleanup/media" \
            | tee media-cleanup-response.json
